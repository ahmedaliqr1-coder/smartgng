            document.getElementById('logoText').textContent = currentData.logo;

            document.getElementById('backHomeLink').textContent = currentData.back;
            document.getElementById('langBtn').textContent = currentData.btn;
            const container = document.getElementById('policyContent');
            container.innerHTML = '';
            currentData.sections.forEach(sec => {
                const div = document.createElement('div');
                div.className = 'policy-section';
                div.innerHTML = `<h2>${sec.h}</h2><p>${sec.p}</p>`;
                container.appendChild(div);
            });
